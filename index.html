<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi Hub Social</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'DM Sans',sans-serif;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#0f0c29;
  overflow:hidden;
  position:relative;
  color:white;
}

/* SVG Pattern Background */
body::before{
  content:"";
  position:absolute;
  inset:0;
  background-image:url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='50' cy='50' r='1.5' fill='%23ffffff10'/%3E%3C/svg%3E");
  opacity:0.4;
  z-index:0;
}

/* Gradient overlay */
body::after{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(135deg,#302b63,#24243e,#0f0c29);
  z-index:-1;
}

.card{
  position:relative;
  z-index:1;
  width:90%;
  max-width:380px;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(20px);
  border-radius:25px;
  padding:40px 30px;
  text-align:center;
  box-shadow:0 10px 40px rgba(0,0,0,0.6);
}

.avatar{
  width:100px;
  height:100px;
  border-radius:50%;
  border:3px solid white;
  object-fit:cover;
  margin-bottom:20px;
}

h1{
  font-size:1.5rem;
  margin-bottom:10px;
}

.bio{
  font-size:0.9rem;
  opacity:0.8;
  margin-bottom:30px;
  line-height:1.6;
}

/* Custom Buttons */
.buttons{
  display:flex;
  flex-direction:column;
  gap:15px;
}

.btn{
  padding:12px;
  border:none;
  border-radius:30px;
  cursor:pointer;
  font-weight:600;
  letter-spacing:0.5px;
  transition:0.3s ease;
  text-decoration:none;
  color:white;
  background:linear-gradient(90deg,#ff00cc,#3333ff);
  box-shadow:0 4px 15px rgba(0,0,0,0.4);
}

.btn:hover{
  transform:translateY(-4px) scale(1.05);
  box-shadow:0 8px 25px rgba(0,0,0,0.6);
}

@media(max-width:480px){
  .card{
    padding:30px 20px;
  }
}
</style>
</head>

<body>

<div class="card">

<img class="avatar" src="https://ui-avatars.com/api/?name=Raemiro&background=6a11cb&color=fff&size=200" alt="perfil">

<h1>Raemiro</h1>

<p class="bio">
Desarrollador en formación apasionado por el diseño web, la creatividad digital y la tecnología moderna.
</p>

<div class="buttons">
<a class="btn" href="https://instagram.com" target="_blank">Instagram</a>
<a class="btn" href="https://twitter.com" target="_blank">Twitter / X</a>
<a class="btn" href="https://linkedin.com" target="_blank">LinkedIn</a>
<a class="btn" href="https://youtube.com" target="_blank">YouTube</a>
</div>

</div>

</body>
</html>
