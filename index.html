<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mi Hub Social</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --neon-blue: #4f8ef7;
      --neon-purple: #a855f7;
      --neon-violet: #7c3aed;
      --neon-indigo: #3730a3;
      --card-bg: rgba(10, 10, 30, 0.55);
      --text: #f0f0ff;
      --subtext: #c4b5fd;
      --btn-radius: 20px;
      --transition: 0.3s cubic-bezier(.4,0,.2,1);
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'DM Sans', sans-serif;
      background: #050510;
      overflow-x: hidden;
      padding: 24px 16px;
    }

    /* Animated gradient background */
    .bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      background: linear-gradient(135deg, #0a0020, #0d0040, #1a0060, #0a0020);
      background-size: 400% 400%;
      animation: gradientShift 10s ease infinite;
    }

    .bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 20% 30%, rgba(79,142,247,0.25) 0%, transparent 70%),
        radial-gradient(ellipse 50% 60% at 80% 70%, rgba(168,85,247,0.3) 0%, transparent 70%),
        radial-gradient(ellipse 40% 40% at 50% 50%, rgba(124,58,237,0.15) 0%, transparent 70%);
    }

    @keyframes gradientShift {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* Card */
    .card {
      position: relative;
      z-index: 1;
      width: 90%;
      max-width: 400px;
      background: var(--card-bg);
      border: 1px solid rgba(168, 85, 247, 0.25);
      border-radius: 28px;
      padding: 40px 32px 36px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      box-shadow:
        0 8px 40px rgba(0,0,0,0.5),
        0 0 80px rgba(79,142,247,0.08),
        0 0 40px rgba(168,85,247,0.08);
      animation: fadeUp 0.7s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Avatar */
    .avatar-wrap {
      position: relative;
      animation: fadeUp 0.7s 0.1s ease both;
    }

    .avatar {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid #fff;
      display: block;
      box-shadow: 0 0 0 4px rgba(168,85,247,0.3), 0 4px 24px rgba(0,0,0,0.4);
    }

    /* Name & bio */
    .name {
      font-size: 1.45rem;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.02em;
      text-align: center;
      animation: fadeUp 0.7s 0.2s ease both;
    }

    .bio {
      font-size: 0.9rem;
      font-weight: 400;
      color: var(--subtext);
      line-height: 1.65;
      text-align: center;
      max-width: 320px;
      animation: fadeUp 0.7s 0.3s ease both;
    }

    /* Divider */
    .divider {
      width: 48px;
      height: 2px;
      background: linear-gradient(90deg, var(--neon-blue), var(--neon-purple));
      border-radius: 2px;
      animation: fadeUp 0.7s 0.35s ease both;
    }

    /* Buttons */
    .buttons {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 100%;
      animation: fadeUp 0.7s 0.4s ease both;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 13px 20px;
      border-radius: var(--btn-radius);
      border: 1px solid transparent;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.92rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: transform var(--transition), box-shadow var(--transition), background var(--transition);
      letter-spacing: 0.01em;
    }

    .btn:hover, .btn:focus {
      transform: scale(1.05);
      outline: none;
    }

    .btn svg {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
    }

    /* Button variants */
    .btn-instagram {
      background: linear-gradient(135deg, rgba(79,142,247,0.18), rgba(168,85,247,0.22));
      border-color: rgba(168,85,247,0.45);
      color: #e9d5ff;
      box-shadow: 0 2px 16px rgba(168,85,247,0.1);
    }
    .btn-instagram:hover {
      background: linear-gradient(135deg, rgba(79,142,247,0.28), rgba(168,85,247,0.35));
      box-shadow: 0 4px 24px rgba(168,85,247,0.28);
    }

    .btn-twitter {
      background: linear-gradient(135deg, rgba(79,142,247,0.22), rgba(59,130,246,0.2));
      border-color: rgba(79,142,247,0.5);
      color: #bfdbfe;
      box-shadow: 0 2px 16px rgba(79,142,247,0.1);
    }
    .btn-twitter:hover {
      background: linear-gradient(135deg, rgba(79,142,247,0.35), rgba(59,130,246,0.3));
      box-shadow: 0 4px 24px rgba(79,142,247,0.3);
    }

    .btn-linkedin {
      background: linear-gradient(135deg, rgba(124,58,237,0.2), rgba(79,142,247,0.18));
      border-color: rgba(124,58,237,0.45);
      color: #ddd6fe;
      box-shadow: 0 2px 16px rgba(124,58,237,0.1);
    }
    .btn-linkedin:hover {
      background: linear-gradient(135deg, rgba(124,58,237,0.32), rgba(79,142,247,0.28));
      box-shadow: 0 4px 24px rgba(124,58,237,0.28);
    }

    .btn-youtube {
      background: linear-gradient(135deg, rgba(168,85,247,0.18), rgba(124,58,237,0.22));
      border-color: rgba(168,85,247,0.4);
      color: #f3e8ff;
      box-shadow: 0 2px 16px rgba(168,85,247,0.08);
    }
    .btn-youtube:hover {
      background: linear-gradient(135deg, rgba(168,85,247,0.3), rgba(124,58,237,0.32));
      box-shadow: 0 4px 24px rgba(168,85,247,0.25);
    }

    /* Responsive */
    @media (max-width: 480px) {
      .card { padding: 32px 22px 28px; }
      .avatar { width: 92px; height: 92px; }
      .name { font-size: 1.25rem; }
    }
  </style>
</head>
<body>

  <div class="bg"></div>

  <div class="card">

    <div class="avatar-wrap">
      <img
        class="avatar"
        src="https://ui-avatars.com/api/?name=Tu+Nombre&background=7c3aed&color=fff&size=200"
        alt="Foto de perfil"
      />
    </div>

    <h1 class="name">Tu Nombre</h1>

    <p class="bio">
      Diseñador, desarrollador y creador de contenido digital. Apasionado por la tecnología, el diseño y las ideas que transforman el mundo. Bienvenido a mi espacio en la red.
    </p>

    <div class="divider"></div>

    <nav class="buttons">

      <a class="btn btn-instagram" href="https://instagram.com/tuusuario" target="_blank" rel="noopener">
        <!-- Instagram icon -->
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
          <circle cx="12" cy="12" r="4"/>
          <circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"/>
        </svg>
        Instagram
      </a>

      <a class="btn btn-twitter" href="https://twitter.com/tuusuario" target="_blank" rel="noopener">
        <!-- X / Twitter icon -->
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
        </svg>
        Twitter / X
      </a>

      <a class="btn btn-linkedin" href="https://linkedin.com/in/tuusuario" target="_blank" rel="noopener">
        <!-- LinkedIn icon -->
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>
        </svg>
        LinkedIn
      </a>

      <a class="btn btn-youtube" href="https://youtube.com/@tucanal" target="_blank" rel="noopener">
        <!-- YouTube icon -->
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M23.498 6.186a3.016 3.016 0 00-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 00.502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 002.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 002.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/>
        </svg>
        YouTube
      </a>

    </nav>

  </div>

</body>
</html>
